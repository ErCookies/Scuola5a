<html>
	<head>
		<title>Gelateria - DB</title>
		<script src="script.js"></script>
	</head>
	<!--
	Creare un applicativo Web per la visualizzazione del catalogo di gelati.
	Per ogni gelato si conoscono le seguenti informazioni:
		Nome gelato
		Data di produzione
		Data di scadenza
		Quantità
		Produttore
	PAGINA CLIENT:
	Campo di input dove inserire il nome del gelato
	Campo di input DATA: dove indicare una data di scadenza
	Campo di input Produttore: dove indicare un produttore.
	-->
	<body>
		<h1>Gelati - DB</h1>
		<form name="frmGel" onsubmit="return false;">
			<input type="text" name="Nome" id="Nome" oninput='cercaGelatiNome(frmGel)'>
			<input type="text" name="Data" id="Data" oninput='cercaGelatiData(frmGel)'>
			<input type="text" name="Prod" id="Prod" oninput='cercaGelatiProd(frmGel)'>
		</form>
		<br>
		<div id="ris"></div>
	</body>
</html>
